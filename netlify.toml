[build]
publish = "public"
# Drop --gc so the cache plugin can reuse processed assets between builds.
# Production uses baseURL from hugo.yaml (https://blog.nextside.tech/);
# previews override via $DEPLOY_PRIME_URL in the contexts below.
command = "hugo --minify"

[build.environment]
HUGO_VERSION = "0.161.1"
GO_VERSION = "1.22"

# Persist Hugo's processed-assets cache (resources/_gen) and module/remote
# resource cache across builds. First build after enabling is cold; every
# subsequent build reuses resized images, compiled SCSS, fetched modules,
# etc. Typically cuts 50-80% off build time for content-heavy sites.
[[plugins]]
  package = "netlify-plugin-cache"

  [plugins.inputs]
    paths = [
      "resources/_gen",
      "/opt/build/cache/hugo_cache"
    ]

[context.deploy-preview]
command = "hugo --minify -b $DEPLOY_PRIME_URL"

[context.branch-deploy]
command = "hugo --minify -b $DEPLOY_PRIME_URL"
